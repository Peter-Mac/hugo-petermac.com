baseURL: 'https://www.petermac.com'
title: 'Peter Mac'
locale: 'en-au'
pagination.pagerSize: 5
hasCJKLanguage: false
enableRobotsTXT: true
timeZone: 'Australia/Melbourne'
summaryLength: 30 # words --- if you use summaries **without** the `--more--` workaround
theme: petermac-theme
relativeURLS: true
ignoreLogs: 
  - 'warning-goldmark-raw-html'

sitemap:
  changefreq: weekly
  priority: 0.5

permalinks:
  posts: posts/:year/:month/:slug/
  page: /:slug/

services:
  googleAnalytics:
    ID: 'G-7Y8CSL5DSV'

# Broad set of custom parmeters go below here

params:
  Title: Peter Mac
  Author: Peter Mac
  AuthorEmail: peter@petermac.com
  Domain: petermac.com
  header_image: img/uluru.webp
  SEOTitle: Peter Mac | Technology Architect
  Description: Pragmatic technology architect helping growing businesses make sensible technology decisions.
  keyword: >-
    technology architect, solution architect, SME consulting,
    architecture advisory, Melbourne, Australia
  Slogan: Pragmatic technology architect for growing businesses
  upstreamAttribution: false
  omit_categories: true
  featured_tags: false
  sidebar_about_description: 'Technology Architect, Home Automation enthusiast, Motorcyclist'
  sidebar_avatar: img/peter-mac.png
  image_404: img/tram.webp
  email_obfuscation: local

  # Additional search engine parameter
  search_engine:
    - pagefind

  menus:
    main:
    - name: Consulting
      pageRef: /consulting
    - name: Services
      pageRef: /services
    - name: About
      pageRef: /about
    - name: Contact
      pageRef: /contact
    - name: Cv
      pageRef: /cv

  og:
    site_name: "Peter Mac"
    title: "Peter Mac | Technology Architect"
    description: "Pragmatic solution architect helping growing businesses make sensible technology decisions — cost-aware, outcome-focused, 30 years across industries."

  social:
    rss: false
    linkedin: 'https://www.linkedin.com/in/peter-mac-44135121/'
    github: 'https://github.com/Peter-Mac'

